name: Terraform validation

on:
  pull_request:
    branches: [master]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: Check formatting
        run: terraform fmt -check -recursive infra
      - name: Validate bootstrap
        run: terraform -chdir=infra/bootstrap init -backend=false && terraform -chdir=infra/bootstrap validate
      - name: Validate production
        run: terraform -chdir=infra/production init -backend=false && terraform -chdir=infra/production validate
      - name: Scan Terraform configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          exit-code: '1'
          severity: CRITICAL,HIGH
