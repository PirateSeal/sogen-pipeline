name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  quality:
    name: Lint, tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build API
        run: npm run build

  release:
    name: Build and publish release
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Define image metadata
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          short_sha="${GITHUB_SHA::12}"
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/slo-watch"

          {
            echo "VERSION=$version"
            echo "SHORT_SHA=$short_sha"
            echo "IMAGE_NAME=$image_name"
            echo "IMAGE_SHA=$image_name:$short_sha"
            echo "IMAGE_VERSION=$image_name:$version"
          } >> "$GITHUB_ENV"

      - name: Build release image
        run: |
          docker build \
            --build-arg "APP_VERSION=$VERSION" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=$VERSION" \
            --tag "$IMAGE_SHA" \
            .
          docker image tag "$IMAGE_SHA" "$IMAGE_VERSION"

      - name: Verify release image
        run: npm run test:container -- "$IMAGE_SHA"

      - name: Authenticate to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin <<< "$GITHUB_TOKEN"

      - name: Publish image
        run: |
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$VERSION" --verify-tag --title "$VERSION" --generate-notes
