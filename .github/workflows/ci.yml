name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  quality:
    name: Lint, tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build API and dashboard
        run: npm run build

      - name: Analyze with SonarQube Cloud
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check SonarQube Cloud quality gate
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        with:
          pollingTimeoutSec: 300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Write quality summary
        shell: bash
        run: |
          node <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import { readFileSync } from 'node:fs';

          const coverage = JSON.parse(readFileSync('coverage/coverage-summary.json', 'utf8')).total;
          const metric = (name) => `${coverage[name].pct}%`;

          console.log('## Quality checks');
          console.log('All API and dashboard checks passed: dependency installation, lint, Vitest coverage, and production builds.');
          console.log('');
          console.log('| Statements | Branches | Functions | Lines |');
          console.log('| ---: | ---: | ---: | ---: |');
          console.log(`| ${metric('statements')} | ${metric('branches')} | ${metric('functions')} | ${metric('lines')} |`);
          EOF

  trivy-fs:
    name: Trivy filesystem scan
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

  release:
    name: Build and publish release
    needs:
      - quality
      - trivy-fs
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: production
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    environment: production

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Define image metadata
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          short_sha="${GITHUB_SHA::12}"
          api_image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/slo-watch-api"
          web_image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/slo-watch-web"

          {
            echo "VERSION=$version"
            echo "SHORT_SHA=$short_sha"
            echo "API_IMAGE_SHA=$api_image_name:$short_sha"
            echo "API_IMAGE_VERSION=$api_image_name:$version"
            echo "WEB_IMAGE_SHA=$web_image_name:$short_sha"
            echo "WEB_IMAGE_VERSION=$web_image_name:$version"
          } >> "$GITHUB_ENV"

      - name: Build release images
        run: |
          docker build \
            --target api \
            --build-arg "APP_VERSION=$VERSION" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=$VERSION" \
            --tag "$API_IMAGE_SHA" \
            .
          docker image tag "$API_IMAGE_SHA" "$API_IMAGE_VERSION"
          docker build \
            --target web \
            --build-arg "APP_VERSION=$VERSION" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=$VERSION" \
            --tag "$WEB_IMAGE_SHA" \
            .
          docker image tag "$WEB_IMAGE_SHA" "$WEB_IMAGE_VERSION"

      - name: Verify release images
        run: npm run test:compose -- "$API_IMAGE_SHA" "$WEB_IMAGE_SHA"

      - name: Scan API release image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE_SHA }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Scan dashboard release image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE_SHA }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Authenticate to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin <<< "$GITHUB_TOKEN"

      - name: Publish images
        run: |
          docker push "$API_IMAGE_SHA"
          docker push "$API_IMAGE_VERSION"
          docker push "$WEB_IMAGE_SHA"
          docker push "$WEB_IMAGE_VERSION"

      - name: Resolve immutable image digests
        shell: bash
        run: |
          api_digest="$(docker image inspect --format='{{index .RepoDigests 0}}' "$API_IMAGE_SHA")"
          web_digest="$(docker image inspect --format='{{index .RepoDigests 0}}' "$WEB_IMAGE_SHA")"
          {
            echo "API_IMAGE_DIGEST=$api_digest"
            echo "WEB_IMAGE_DIGEST=$web_digest"
            echo "API_IMAGE_DIGEST_SHA=${api_digest#*@}"
            echo "WEB_IMAGE_DIGEST_SHA=${web_digest#*@}"
          } >> "$GITHUB_ENV"

      - name: Generate API SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.API_IMAGE_DIGEST }}
          format: cyclonedx
          output: api.sbom.cdx.json
          exit-code: '0'

      - name: Generate dashboard SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.WEB_IMAGE_DIGEST }}
          format: cyclonedx
          output: web.sbom.cdx.json
          exit-code: '0'

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Sign immutable images with GitHub OIDC
        run: |
          cosign sign --yes "$API_IMAGE_DIGEST"
          cosign sign --yes "$WEB_IMAGE_DIGEST"

      - name: Attest API SBOM
        uses: actions/attest-sbom@10926c72720ffc3f7b666661c8e55b1344e2a365 # v2
        with:
          subject-name: ${{ env.API_IMAGE_SHA }}
          subject-digest: ${{ env.API_IMAGE_DIGEST_SHA }}
          sbom-path: api.sbom.cdx.json
          push-to-registry: true

      - name: Attest dashboard SBOM
        uses: actions/attest-sbom@10926c72720ffc3f7b666661c8e55b1344e2a365 # v2
        with:
          subject-name: ${{ env.WEB_IMAGE_SHA }}
          subject-digest: ${{ env.WEB_IMAGE_DIGEST_SHA }}
          sbom-path: web.sbom.cdx.json
          push-to-registry: true

      - name: Attest API provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ${{ env.API_IMAGE_SHA }}
          subject-digest: ${{ env.API_IMAGE_DIGEST_SHA }}
          push-to-registry: true

      - name: Attest dashboard provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ${{ env.WEB_IMAGE_SHA }}
          subject-digest: ${{ env.WEB_IMAGE_DIGEST_SHA }}
          push-to-registry: true

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ca-central-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Deploy immutable images to ECS
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          test -n "$TF_STATE_BUCKET"
          terraform -chdir=infra/production init -input=false -backend-config="bucket=$TF_STATE_BUCKET"
          terraform -chdir=infra/production apply -input=false -auto-approve \
            -var="api_image=$API_IMAGE_DIGEST" \
            -var="web_image=$WEB_IMAGE_DIGEST" \
            -var="app_version=$VERSION"

      - name: Smoke test production endpoint
        run: |
          curl --fail --retry 12 --retry-delay 10 --retry-connrefused https://sogen.tcousin.com/healthz
          curl --fail --retry 6 --retry-delay 5 https://sogen.tcousin.com/api/status

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$VERSION" --verify-tag --title "$VERSION" --generate-notes

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Release published"
            echo
            echo "| Item | Reference |"
            echo "| --- | --- |"
            echo "| Git tag | [\`$VERSION\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/$VERSION) |"
            echo "| Commit | [\`$SHORT_SHA\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| API image | \`$API_IMAGE_VERSION\` |"
            echo "| API immutable tag | \`$API_IMAGE_SHA\` |"
            echo "| Web image | \`$WEB_IMAGE_VERSION\` |"
            echo "| Web immutable tag | \`$WEB_IMAGE_SHA\` |"
          } >> "$GITHUB_STEP_SUMMARY"
