services:
  api:
    build:
      context: .
      target: api
    environment:
      APP_VERSION: local
      CHECK_INTERVAL_MS: 1000
      REQUEST_TIMEOUT_MS: 5000
      SLO_TARGET: 0.995
      TARGETS_JSON: '[{"id":"portfolio","url":"https://tcousin.com"}]'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
    image: ${API_IMAGE:-slo-watch-api:local}

  web:
    build:
      context: .
      target: web
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_UPSTREAM: http://api:3000
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --spider http://127.0.0.1/healthz || exit 1']
    image: ${WEB_IMAGE:-slo-watch-web:local}
    ports:
      - '127.0.0.1:8080:80'
